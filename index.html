<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VDC Check-in v0.4</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #f0f2f5; margin: 0; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        #map { height: 250px; border-radius: 10px; border: 1px solid #1a73e8; margin: 10px 0; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; }
        .info-msg { font-size: 12px; color: #1a73e8; margin-bottom: 10px; text-align: center; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color: #1a73e8; text-align: center; margin-top:0">ĐIỂM DANH v0.4</h2>
        <div class="info-msg">Hệ thống sẽ tự điền tên khi bạn nhập STT</div>
        <input type="number" id="stt" placeholder="Số thứ tự (STT)" oninput="autoFind('STT')">
        <input type="text" id="name" placeholder="Họ và tên học viên" oninput="autoFind('NAME')">
        <div id="map"></div>
        <button onclick="checkin()">XÁC NHẬN CÓ MẶT</button>
        <div id="status" style="text-align:center; font-size:12px; color:#999; margin-top:10px;">VDC Engine v0.4</div>
    </div>

    <script>
        const API = 'https://script.google.com/macros/s/AKfycbzwKuIfVpeUR3vVRcuDN8V48V4mx4eD4FGuPxnpCIS9Srdwx9bMLwDtaW0BdLkmhigv/exec';
        const SID = '1tGe_Hh5kK99hDAOFEQpLOpV3zadm6OSn_h5JA1DkDPE';
        var map = L.map('map').setView([10.76, 106.66], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        var marker;

        navigator.geolocation.watchPosition(pos => {
            const {latitude, longitude} = pos.coords;
            if (marker) marker.setLatLng([latitude, longitude]);
            else marker = L.marker([latitude, longitude]).addTo(map);
            map.setView([latitude, longitude], 18);
        }, null, {enableHighAccuracy: true});

        async function autoFind(type) {
            const val = (type === 'STT') ? document.getElementById('stt').value : document.getElementById('name').value;
            if (!val || (type === 'NAME' && val.length < 3)) return;
            
            try {
                const response = await fetch(API, {
                    method: 'POST',
                    body: JSON.stringify({action: 'GET_INFO', input: val, sheetId: SID})
                });
                const resData = await response.json();
                if (resData.success) {
                    document.getElementById('stt').value = resData.stt;
                    document.getElementById('name').value = resData.name;
                }
            } catch (e) { console.log("Searching..."); }
        }

        function checkin() {
            const sttVal = document.getElementById('stt').value;
            if(!sttVal || !marker) return alert("Vui lòng nhập đúng STT/Tên và đợi GPS");
            const p = marker.getLatLng();
            
            fetch(API, {
                method: 'POST', mode: 'no-cors',
                body: JSON.stringify({stt: sttVal, userLat: p.lat, userLng: p.lng, sheetId: SID})
            }).then(() => alert("Đã gửi yêu cầu điểm danh!"));
        }
    </script>
</body>
</html>
