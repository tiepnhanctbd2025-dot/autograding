<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VDC CHECK-IN v0.9.9</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; padding: 15px; background: #f0f2f5; margin: 0; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        .header-title { text-align: center; margin-bottom: 15px; }
        .header-title h2 { color: #1a73e8; margin: 0; font-size: 20px; }
        .header-title span { color: #999; font-size: 11px; font-weight: bold; }
        .search-container { position: relative; width: 100%; margin-bottom: 15px; }
        .search-container input { width: 100%; padding: 15px 45px 15px 15px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; outline: none; }
        .search-container i { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #1a73e8; font-size: 18px; cursor: pointer; }
        .fa-spin-custom { animation: fa-spin 1s infinite linear; pointer-events: none; color: #999 !important; }
        .info-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .info-row input { background: #f8f8f8; border: 1px solid #eee; padding: 12px; border-radius: 8px; font-weight: bold; pointer-events: none; width: 100%; box-sizing: border-box; }
        #videoContainer { width: 100%; height: 260px; background: #000; border-radius: 10px; overflow: hidden; margin-bottom: 15px; border: 2px solid #1a73e8; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        button { width: 100%; padding: 18px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; }
        button:disabled { background: #ccc; }
        #statusMsg { text-align:center; color:#1a73e8; font-weight:bold; display:none; margin-bottom: 15px; }
        #successScreen, #closedScreen { display: none; text-align: center; padding: 40px 10px; }
    </style>
</head>
<body>
    <div id="loading" style="text-align:center; padding: 30px; color: #666;">Đang kết nối hệ thống v0.9.9...</div>
    <div class="card" id="closedScreen"><div class="header-title"><h2 style="color:#e74c3c;">🔒 LỚP CHƯA MỞ</h2><span>PHIÊN BẢN 0.9.9</span></div><button onclick="location.reload()" style="background:#e74c3c;">TẢI LẠI TRANG</button></div>
    <div class="card" id="inputCard" style="display:none;">
        <div class="header-title"><h2>ĐIỂM DANH AN TOÀN</h2><span>PHIÊN BẢN 0.9.9</span></div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Tìm tên hoặc STT (vd: 1 hoặc dep)..." onkeyup="if(event.keyCode===13) autoFind()">
            <i id="searchIcon" class="fa-solid fa-magnifying-glass" onclick="autoFind()"></i>
        </div>
        <div class="info-row"><div style="width:25%"><input type="text" id="stt" placeholder="STT"></div><div style="width:75%"><input type="text" id="name" placeholder="Tên học viên"></div></div>
        <div id="videoContainer"><video id="video" autoplay playsinline></video></div>
        <div id="statusMsg">⌛ Đang xử lý dữ liệu...</div>
        <button id="btnSubmit" onclick="checkin()">XÁC NHẬN CÓ MẶT</button>
    </div>
    <div class="card" id="successScreen">
        <div style="font-size:70px; color:#2ecc71; text-align: center;">✔</div>
        <div class="header-title"><h2 style="color:#2ecc71;">ĐÃ GHI NHẬN!</h2><span>PHIÊN BẢN 0.9.9</span></div>
        <p id="resultInfo" style="text-align: center; font-size:18px;"></p>
        <button onclick="location.reload()" style="background:#95a5a6; margin-top:20px;">QUAY LẠI</button>
    </div>
    <canvas id="canvas" style="display:none;"></canvas>
    <script>
        const API = 'https://script.google.com/macros/s/AKfycbw_0bC4RVeQuwQEhx4th5UIIVpioCFmEcelW4suLR86pdXaZvFHRRByWLWuqvEALjIx/exec';
        const video = document.getElementById('video');
        var userLoc = null;
        window.onload = checkStatus;
        async function checkStatus() {
            try {
                const res = await fetch(API, { method: 'POST', body: JSON.stringify({action: 'CHECK_STATUS'}) });
                const data = await res.json(); document.getElementById('loading').style.display = 'none';
                if (data.isActive) {
                    document.getElementById('inputCard').style.display = 'block';
                    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } }).then(s => video.srcObject = s);
                    navigator.geolocation.watchPosition(p => userLoc = {lat: p.coords.latitude, lng: p.coords.longitude}, null, {enableHighAccuracy:true});
                } else document.getElementById('closedScreen').style.display = 'block';
            } catch (e) { document.getElementById('loading').innerText = "Lỗi kết nối!"; }
        }
        async function autoFind() {
            const val = document.getElementById('searchInput').value.trim();
            const icon = document.getElementById('searchIcon');
            if (val.length < 1) return;
            icon.classList.add('fa-spin-custom', 'fa-spinner'); icon.classList.remove('fa-magnifying-glass');
            document.getElementById('name').value = "Đang tìm...";
            try {
                const res = await fetch(API, { method: 'POST', body: JSON.stringify({action: 'GET_INFO', input: val}) });
                const data = await res.json();
                if (data.success) { document.getElementById('stt').value = data.stt; document.getElementById('name').value = data.name; }
                else { document.getElementById('stt').value = ""; document.getElementById('name').value = "Không thấy!"; }
            } catch (e) { document.getElementById('name').value = "Lỗi kết nối!"; }
            finally { icon.classList.remove('fa-spin-custom', 'fa-spinner'); icon.classList.add('fa-magnifying-glass'); }
        }
        async function checkin() {
            const stt = document.getElementById('stt').value; if(!stt || !userLoc) return alert("Tìm đúng tên & chờ GPS!");
            document.getElementById('statusMsg').style.display = 'block'; document.getElementById('btnSubmit').disabled = true;
            const canvas = document.getElementById('canvas'); const ctx = canvas.getContext('2d');
            canvas.width = 320; canvas.height = 240; ctx.translate(320, 0); ctx.scale(-1, 1); ctx.drawImage(video, 0, 0, 320, 240);
            const img = canvas.toDataURL('image/jpeg', 0.6).split(',')[1];
            try {
                const response = await fetch(API, { method: 'POST', body: JSON.stringify({stt: stt, userLat: userLoc.lat, userLng: userLoc.lng, image: img, instructorEmail: "Học viên"}) });
                const result = await response.json();
                if (result.success) { document.getElementById('inputCard').style.display = 'none'; document.getElementById('successScreen').style.display = 'block'; document.getElementById('resultInfo').innerHTML = `Học viên <b>${result.name}</b> thành công.`; }
                else { alert(result.msg); document.getElementById('statusMsg').style.display = 'none'; document.getElementById('btnSubmit').disabled = false; }
            } catch (e) { alert("Lỗi gửi dữ liệu!"); }
        }
    </script>
</body>
</html>
