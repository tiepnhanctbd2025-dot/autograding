<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VDC Check-in v0.9.2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; padding: 15px; background: #f0f2f5; margin: 0; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        
        /* Giao diện ô tìm kiếm mới */
        .search-container { position: relative; width: 100%; margin-bottom: 15px; }
        .search-container input { width: 100%; padding: 15px 45px 15px 15px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; outline: none; transition: 0.3s; }
        .search-container input:focus { border-color: #1a73e8; }
        .search-container i { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #1a73e8; font-size: 18px; cursor: pointer; }

        .info-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .info-row input { background: #f8f8f8; border: 1px solid #eee; padding: 12px; border-radius: 8px; font-weight: bold; color: #333; pointer-events: none; }

        #videoContainer { position: relative; width: 100%; height: 260px; background: #000; border-radius: 10px; overflow: hidden; margin-bottom: 15px; border: 2px solid #1a73e8; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        canvas { display: none; }
        
        button { width: 100%; padding: 18px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.3s; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        
        #statusMsg { text-align:center; color:#1a73e8; font-weight:bold; display:none; margin-bottom: 15px; }
        #successScreen, #closedScreen { display: none; text-align: center; padding: 40px 10px; }
        .tick-icon { font-size: 80px; color: #2ecc71; margin-bottom: 15px; }
        h2 { margin-top: 0; color: #1a73e8; text-align: center; }
    </style>
</head>
<body>
    <div id="loading" style="text-align:center; padding: 30px; color: #666;">Đang kết nối hệ thống huấn luyện...</div>
    
    <div class="card" id="closedScreen">
        <h2 style="color: #e74c3c;">🔒 LỚP CHƯA MỞ</h2>
        <p>Vui lòng chờ giảng viên mở lớp hoặc chốt vị trí.</p>
        <button onclick="location.reload()" style="background: #e74c3c;">TẢI LẠI TRANG</button>
    </div>

    <div class="card" id="inputCard" style="display:none;">
        <h2>ĐIỂM DANH AN TOÀN</h2>
        
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Nhập Tên hoặc STT..." oninput="autoFind()">
            <i class="fa-solid fa-magnifying-glass" onclick="autoFind()"></i>
        </div>

        <div class="info-row">
            <input type="text" id="stt" placeholder="STT" style="width: 25%;">
            <input type="text" id="name" placeholder="Học viên" style="width: 75%;">
        </div>

        <div id="videoContainer"><video id="video" autoplay playsinline></video></div>
        <div id="statusMsg">⌛ Đang xử lý dữ liệu...</div>
        <button id="btnSubmit" onclick="checkin()">XÁC NHẬN CÓ MẶT</button>
    </div>

    <div class="card" id="successScreen">
        <div class="tick-icon">✔</div>
        <h2 style="color: #2ecc71;">ĐÃ GHI NHẬN!</h2>
        <p id="resultInfo" style="font-size: 18px;"></p>
        <button onclick="location.reload()" style="background: #95a5a6; margin-top: 25px;">QUAY LẠI</button>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const API = 'https://script.google.com/macros/s/AKfycbw_0bC4RVeQuwQEhx4th5UIIVpioCFmEcelW4suLR86pdXaZvFHRRByWLWuqvEALjIx/exec';
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        var userLoc = null;

        window.onload = checkStatus;

        async function checkStatus() {
            try {
                const res = await fetch(API, { method: 'POST', body: JSON.stringify({action: 'CHECK_STATUS'}) });
                const data = await res.json();
                document.getElementById('loading').style.display = 'none';
                if (data.isActive) {
                    document.getElementById('inputCard').style.display = 'block';
                    startCamera();
                    startGPS();
                } else {
                    document.getElementById('closedScreen').style.display = 'block';
                }
            } catch (e) { document.getElementById('loading').innerText = "Lỗi kết nối máy chủ!"; }
        }

        function startCamera() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(s => video.srcObject = s)
            .catch(e => alert("Vui lòng cho phép truy cập Camera!"));
        }

        function startGPS() {
            navigator.geolocation.watchPosition(
                p => userLoc = {lat: p.coords.latitude, lng: p.coords.longitude},
                e => console.log("GPS Error"),
                {enableHighAccuracy:true}
            );
        }

        async function autoFind() {
            const val = document.getElementById('searchInput').value;
            const sttOut = document.getElementById('stt');
            const nameOut = document.getElementById('name');

            if (val.length < 2) {
                sttOut.value = ""; nameOut.value = "";
                return;
            }

            try {
                const res = await fetch(API, { method: 'POST', body: JSON.stringify({action: 'GET_INFO', input: val}) });
                const data = await res.json();
                if (data.success) {
                    sttOut.value = data.stt;
                    nameOut.value = data.name;
                    // Hiệu ứng đổi màu nhẹ khi tìm thấy
                    sttOut.style.background = "#e8f0fe";
                    nameOut.style.background = "#e8f0fe";
                } else {
                    sttOut.value = ""; nameOut.value = "Không thấy dữ liệu";
                    sttOut.style.background = "#f8f8f8";
                }
            } catch (e) {}
        }

        async function checkin() {
            const stt = document.getElementById('stt').value;
            if(!stt) return alert("Vui lòng tìm đúng tên học viên!");
            if(!userLoc) return alert("Đang lấy tọa độ GPS, vui lòng đợi...");

            document.getElementById('statusMsg').style.display = 'block';
            document.getElementById('btnSubmit').disabled = true;

            const ctx = canvas.getContext('2d');
            canvas.width = 320; canvas.height = 240;
            ctx.translate(320, 0); ctx.scale(-1, 1);
            ctx.drawImage(video, 0, 0, 320, 240);
            const img = canvas.toDataURL('image/jpeg', 0.6).split(',')[1];

            try {
                const response = await fetch(API, {
                    method: 'POST',
                    body: JSON.stringify({stt: stt, userLat: userLoc.lat, userLng: userLoc.lng, image: img, instructorEmail: "Học viên"})
                });
                const result = await response.json();
                if (result.success) {
                    document.getElementById('inputCard').style.display = 'none';
                    document.getElementById('successScreen').style.display = 'block';
                    document.getElementById('resultInfo').innerHTML = `Học viên <b>${result.name}</b><br>điểm danh thành công.`;
                } else { 
                    alert("Lỗi: " + result.msg); 
                    document.getElementById('statusMsg').style.display = 'none'; 
                    document.getElementById('btnSubmit').disabled = false; 
                }
            } catch (e) { 
                alert("Lỗi mạng!"); 
                document.getElementById('btnSubmit').disabled = false;
            }
        }
    </script>
</body>
</html>
