<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VDC Check-in v0.2</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; }
        #map { height: 250px; border-radius: 10px; border: 1px solid #1a73e8; margin: 10px 0; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>
    <h2 style="color: #1a73e8;">ĐIỂM DANH v0.2</h2>
    <input type="text" id="name" placeholder="Nhập Họ và Tên">
    <div id="map"></div>
    <button onclick="checkin()">XÁC NHẬN CÓ MẶT</button>

    <script>
        const API = 'https://script.google.com/macros/s/AKfycbzwKuIfVpeUR3vVRcuDN8V48V4mx4eD4FGuPxnpCIS9Srdwx9bMLwDtaW0BdLkmhigv/exec';
        const SID = '1tGe_Hh5kK99hDAOFEQpLOpV3zadm6OSn_h5JA1DkDPE';
        var map = L.map('map').setView([10.76, 106.66], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        var marker;

        navigator.geolocation.watchPosition(pos => {
            const {latitude, longitude} = pos.coords;
            if (marker) marker.setLatLng([latitude, longitude]);
            else marker = L.marker([latitude, longitude]).addTo(map);
            map.setView([latitude, longitude], 18);
        }, null, {enableHighAccuracy: true});

        function checkin() {
            const n = document.getElementById('name').value;
            if(!n || !marker) return alert("Vui lòng nhập tên và đợi GPS");
            const p = marker.getLatLng();
            fetch(API, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({studentName: n, userLat: p.lat, userLng: p.lng, sheetId: SID})
            }).then(() => alert("Đã gửi thông tin! Nếu bạn ở trong lớp, tên sẽ hiện trên Sheet."));
        }
    </script>
</body>
</html>
