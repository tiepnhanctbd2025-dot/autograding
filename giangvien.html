<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VDC Admin v0.7.4</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #fff5f5; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        #map { height: 300px; border-radius: 10px; margin: 15px 0; border: 2px solid #d93025; }
        select, button { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 8px; font-weight: bold; font-size: 16px; border: 1px solid #ddd;}
        button { color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color: #d93025; text-align: center;">QUẢN LÝ v0.7.4</h2>
        
        <div id="setupArea">
            <select id="sessionNum">
                <option value="1">Buổi học 1</option><option value="2">Buổi học 2</option>
                <option value="3">Buổi học 3</option><option value="4">Buổi học 4</option>
                <option value="5">Buổi học 5</option>
            </select>
            <button id="btnOpen" onclick="manageLocation('OPEN')" style="background:#d93025;">MỞ LỚP & CHỐT VỊ TRÍ</button>
        </div>

        <button id="btnClose" onclick="manageLocation('CLOSE')" style="background:#34495e; display:none;">ĐÓNG LỚP HIỆN TẠI</button>

        <div id="map"></div>
        <div id="status" style="text-align:center; font-size:12px; color:#999; margin-top:10px;">Đang tải...</div>
    </div>

    <script>
        const API = 'https://script.google.com/macros/s/AKfycbzwKuIfVpeUR3vVRcuDN8V48V4mx4eD4FGuPxnpCIS9Srdwx9bMLwDtaW0BdLkmhigv/exec';
        var map, marker;

        window.onload = async () => {
            // 1. Kiểm tra cấu hình Sheet ID cá nhân
            let savedSid = localStorage.getItem('vdc_sid');
            if (!savedSid) {
                let sid = prompt("Chào Giảng viên! Hãy dán ID Sheet đào tạo của bạn để bắt đầu:");
                if (sid) {
                    localStorage.setItem('vdc_sid', sid);
                    await fetch(API, {method: 'POST', body: JSON.stringify({action:'REGISTER_SHEET', sheetId: sid})});
                    alert("Đăng ký thành công!");
                }
            }

            initMap();
            const res = await fetch(API, {method: 'POST', body: JSON.stringify({action: 'CHECK_STATUS'})});
            const data = await res.json();
            toggleUI(data.isActive);
        };

        function toggleUI(isActive) {
            document.getElementById('setupArea').style.display = isActive ? 'none' : 'block';
            document.getElementById('btnClose').style.display = isActive ? 'block' : 'none';
            document.getElementById('status').innerText = isActive ? "Lớp đang MỞ" : "Lớp đang ĐÓNG";
        }

        function initMap() {
            map = L.map('map').setView([10.76, 106.66], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            navigator.geolocation.watchPosition(pos => {
                const {latitude, longitude} = pos.coords;
                if (marker) marker.setLatLng([latitude, longitude]);
                else marker = L.marker([latitude, longitude]).addTo(map).bindPopup("Vị trí lớp").openPopup();
                map.setView([latitude, longitude], 18);
            }, null, {enableHighAccuracy: true});
        }

        async function manageLocation(mode) {
            const session = document.getElementById('sessionNum').value;
            let payload = { action: 'SET_CLASS_LOCATION', status: mode, sessionNum: session };
            if(mode === 'OPEN') {
                if(!marker) return alert("Đang lấy GPS...");
                const p = marker.getLatLng();
                payload.lat = p.lat; payload.lng = p.lng;
            }
            try {
                const res = await fetch(API, { method: 'POST', body: JSON.stringify(payload) });
                const result = await res.json();
                if(result.success) toggleUI(mode === 'OPEN');
            } catch (e) { alert("Lỗi kết nối!"); }
        }
    </script>
</body>
</html>
