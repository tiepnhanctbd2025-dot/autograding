<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VDC Admin v0.6</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #fff5f5; margin: 0; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        #map { height: 300px; border-radius: 10px; border: 2px solid #d93025; margin: 15px 0; }
        select, button { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 8px; font-weight: bold; font-size: 16px; border: 1px solid #ddd; }
        button { color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color: #d93025; text-align: center; margin-top:0">QUẢN LÝ LỚP v0.6</h2>
        <select id="sessionNum">
            <option value="1">Buổi học 1</option><option value="2">Buổi học 2</option>
            <option value="3">Buổi học 3</option><option value="4">Buổi học 4</option>
            <option value="5">Buổi học 5</option>
        </select>
        <div id="map"></div>
        <button onclick="manageLocation('OPEN')" style="background:#d93025;">MỞ LỚP & CHỐT VỊ TRÍ</button>
        <button onclick="manageLocation('CLOSE')" style="background:#34495e;">ĐÓNG LỚP HỌC</button>
        <div id="status" style="text-align:center; font-size:12px; color:#999; margin-top:10px;">Đang lấy GPS...</div>
    </div>

    <script>
        const API = 'https://script.google.com/macros/s/AKfycbzwKuIfVpeUR3vVRcuDN8V48V4mx4eD4FGuPxnpCIS9Srdwx9bMLwDtaW0BdLkmhigv/exec';
        const SID = '1tGe_Hh5kK99hDAOFEQpLOpV3zadm6OSn_h5JA1DkDPE';
        var map = L.map('map').setView([10.76, 106.66], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        var marker;

        navigator.geolocation.watchPosition(pos => {
            const {latitude, longitude} = pos.coords;
            if (marker) marker.setLatLng([latitude, longitude]);
            else marker = L.marker([latitude, longitude]).addTo(map).bindPopup("Vị trí lớp học").openPopup();
            map.setView([latitude, longitude], 18);
            document.getElementById('status').innerText = "GPS sẵn sàng.";
        }, null, {enableHighAccuracy: true});

        async function manageLocation(mode) {
            const session = document.getElementById('sessionNum').value;
            let payload = { action: 'SET_CLASS_LOCATION', sheetId: SID, status: mode, sessionNum: session };
            
            if(mode === 'OPEN') {
                if(!marker) return alert("Chưa có GPS, vui lòng đợi giây lát.");
                const p = marker.getLatLng();
                payload.lat = p.lat; payload.lng = p.lng;
            }

            try {
                const response = await fetch(API, { method: 'POST', body: JSON.stringify(payload) });
                const res = await response.json();
                if(res.success) alert(mode === 'OPEN' ? "Đã MỞ LỚP & chốt vị trí Buổi " + session : "Lớp đã được ĐÓNG.");
            } catch (e) {
                alert("Lỗi kết nối máy chủ.");
            }
        }
    </script>
</body>
</html>
