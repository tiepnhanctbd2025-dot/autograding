<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VDC ADMIN v0.9.5</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #fff5f5; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        .header-title { text-align: center; margin-bottom: 20px; }
        .header-title h2 { color: #d93025; margin: 0; font-size: 22px; }
        .header-title span { color: #999; font-size: 12px; font-weight: bold; }
        button, select { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; border: 1px solid #ddd; box-sizing: border-box; }
        #map { height: 280px; border-radius: 12px; border: 2px solid #d93025; margin-bottom: 15px; }
        .welcome-text { text-align: center; color: #d93025; font-weight: bold; margin-bottom: 15px; font-size: 14px; }
        .config-link { font-size: 11px; color: #1a73e8; cursor: pointer; text-decoration: underline; display: block; text-align: right; margin-bottom: 10px; }
        .google-btn { background: white; color: #757575; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; gap: 10px; }
    </style>
</head>
<body>
    <div class="card" id="loginBox" style="display:none; text-align: center;">
        <div class="header-title">
            <h2>HỆ THỐNG QUẢN LÝ</h2>
            <span>PHIÊN BẢN 0.9.5</span>
        </div>
        <button class="google-btn" onclick="handleGoogleLogin()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="20"> ĐĂNG NHẬP GOOGLE
        </button>
    </div>

    <div class="card" id="adminBox" style="display:none;">
        <div class="header-title">
            <h2>VDC ADMIN</h2>
            <span>PHIÊN BẢN 0.9.5</span>
        </div>
        <div class="welcome-text" id="userInfo"></div>
        <span class="config-link" onclick="resetSheet()">🔄 Thay đổi ID Sheet</span>
        <div id="setupArea">
            <select id="sessionNum"><option value="1">Buổi 1</option><option value="2">Buổi 2</option><option value="3">Buổi 3</option><option value="4">Buổi 4</option><option value="5">Buổi 5</option></select>
            <button onclick="manageLocation('OPEN')" style="background:#d93025; color:white; border:none;">MỞ LỚP & CHỐT GPS</button>
        </div>
        <button id="btnClose" onclick="manageLocation('CLOSE')" style="background:#34495e; color:white; border:none; display:none;">ĐÓNG LỚP</button>
        <div id="map"></div>
        <button onclick="firebase.auth().signOut()" style="background:none; border:none; color:#999; font-size:12px; width: auto; margin: auto; display: block;">Đăng xuất</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD0g2jxFOY5KQGZeZWyJf0SDxA91sitpxE",
            authDomain: "chamdiemonline-898b1.firebaseapp.com",
            projectId: "chamdiemonline-898b1",
            storageBucket: "chamdiemonline-898b1.firebasestorage.app",
            messagingSenderId: "1073615877091",
            appId: "1:1073615877091:web:b70fa88f2cf740085fe6d6"
        };
        firebase.initializeApp(firebaseConfig);
        const API = 'https://script.google.com/macros/s/AKfycbw_0bC4RVeQuwQEhx4th5UIIVpioCFmEcelW4suLR86pdXaZvFHRRByWLWuqvEALjIx/exec';
        var map, marker, currentUser;

        firebase.auth().onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('adminBox').style.display = 'block';
                document.getElementById('userInfo').innerText = "Chào: " + user.displayName;
                checkConfig(); checkStatus(); initMap();
            } else {
                document.getElementById('loginBox').style.display = 'block';
                document.getElementById('adminBox').style.display = 'none';
            }
        });

        async function handleGoogleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try { await firebase.auth().signInWithPopup(provider); } catch (e) { alert("Lỗi: " + e.message); }
        }

        async function checkConfig() {
            let sid = localStorage.getItem('vdc_sid');
            if (!sid) {
                sid = prompt("Dán ID Google Sheet học viên:");
                if (sid) {
                    localStorage.setItem('vdc_sid', sid);
                    await fetch(API, {method: 'POST', body: JSON.stringify({action:'REGISTER_SHEET', sheetId: sid, instructorEmail: currentUser.email})});
                }
            }
        }

        function resetSheet() { localStorage.removeItem('vdc_sid'); checkConfig(); }

        async function checkStatus() {
            const res = await fetch(API, {method: 'POST', body: JSON.stringify({action: 'CHECK_STATUS'})});
            const data = await res.json();
            document.getElementById('setupArea').style.display = data.isActive ? 'none' : 'block';
            document.getElementById('btnClose').style.display = data.isActive ? 'block' : 'none';
        }

        function initMap() {
            if (map) return;
            map = L.map('map').setView([10.76, 106.66], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            navigator.geolocation.watchPosition(p => {
                const latlng = [p.coords.latitude, p.coords.longitude];
                if (marker) marker.setLatLng(latlng); else marker = L.marker(latlng).addTo(map);
                map.setView(latlng, 18);
            }, null, {enableHighAccuracy:true});
        }

        async function manageLocation(mode) {
            const session = document.getElementById('sessionNum').value;
            let payload = { action: 'SET_CLASS_LOCATION', status: mode, sessionNum: session, instructorEmail: currentUser.email };
            if(mode === 'OPEN') {
                if(!marker) return alert("Chờ GPS...");
                payload.lat = marker.getLatLng().lat; payload.lng = marker.getLatLng().lng;
            }
            const res = await fetch(API, { method: 'POST', body: JSON.stringify(payload) });
            if((await res.json()).success) location.reload();
        }
    </script>
</body>
</html>
