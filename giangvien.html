<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VDC Admin v0.9 - Firebase</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #fff5f5; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        input, select, button { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 8px; font-weight: bold; border: 1px solid #ddd; box-sizing: border-box; }
        #map { height: 250px; border-radius: 10px; border: 2px solid #d93025; margin: 10px 0; }
        .user-info { font-size: 13px; text-align: center; color: #d93025; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="card" id="loginBox" style="display:none;">
        <h2 style="text-align:center; color:#d93025;">ADMIN LOGIN</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Mật khẩu">
        <button onclick="handleLogin()" style="background:#d93025; color:white;">ĐĂNG NHẬP</button>
    </div>

    <div class="card" id="adminBox" style="display:none;">
        <h2 style="text-align:center; color:#d93025; margin-top:0;">VDC ADMIN v0.9</h2>
        <div id="userInfo" class="user-info"></div>
        <div id="setupArea">
            <select id="sessionNum">
                <option value="1">Buổi 1</option><option value="2">Buổi 2</option>
                <option value="3">Buổi 3</option><option value="4">Buổi 4</option>
                <option value="5">Buổi 5</option>
            </select>
            <button onclick="manageLocation('OPEN')" style="background:#d93025; color:white;">MỞ LỚP & CHỐT VỊ TRÍ</button>
        </div>
        <button id="btnClose" onclick="manageLocation('CLOSE')" style="background:#34495e; color:white; display:none;">ĐÓNG LỚP</button>
        <div id="map"></div>
        <button onclick="firebase.auth().signOut()" style="background:none; border:none; color:#666; font-size:11px; cursor:pointer;">Đăng xuất</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD0g2jxFOY5KQGZeZWyJf0SDxA91sitpxE",
            authDomain: "chamdiemonline-898b1.firebaseapp.com",
            projectId: "chamdiemonline-898b1",
            storageBucket: "chamdiemonline-898b1.firebasestorage.app",
            messagingSenderId: "1073615877091",
            appId: "1:1073615877091:web:b70fa88f2cf740085fe6d6"
        };
        firebase.initializeApp(firebaseConfig);

        const API = 'https://script.google.com/macros/s/AKfycbw_0bC4RVeQuwQEhx4th5UIIVpioCFmEcelW4suLR86pdXaZvFHRRByWLWuqvEALjIx/exec';
        var map, marker, currentUser;

        firebase.auth().onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('adminBox').style.display = 'block';
                document.getElementById('userInfo').innerText = "Đang trực: " + user.email;
                checkSheetConfig();
                checkStatus();
                initMap();
            } else {
                document.getElementById('loginBox').style.display = 'block';
                document.getElementById('adminBox').style.display = 'none';
            }
        });

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            try { await firebase.auth().signInWithEmailAndPassword(email, pass); }
            catch (e) { alert("Lỗi: " + e.message); }
        }

        async function checkSheetConfig() {
            let sid = localStorage.getItem('vdc_sid');
            if (!sid) {
                sid = prompt("Dán ID Sheet học viên của bạn:");
                if (sid) {
                    localStorage.setItem('vdc_sid', sid);
                    await fetch(API, {method: 'POST', body: JSON.stringify({action:'REGISTER_SHEET', sheetId: sid, instructorEmail: currentUser.email})});
                }
            }
        }

        async function checkStatus() {
            const res = await fetch(API, {method: 'POST', body: JSON.stringify({action: 'CHECK_STATUS'})});
            const data = await res.json();
            document.getElementById('setupArea').style.display = data.isActive ? 'none' : 'block';
            document.getElementById('btnClose').style.display = data.isActive ? 'block' : 'none';
        }

        function initMap() {
            map = L.map('map').setView([10.76, 106.66], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            navigator.geolocation.watchPosition(p => {
                const latlng = [p.coords.latitude, p.coords.longitude];
                if (marker) marker.setLatLng(latlng);
                else marker = L.marker(latlng).addTo(map);
                map.setView(latlng, 18);
            }, null, {enableHighAccuracy:true});
        }

        async function manageLocation(mode) {
            const session = document.getElementById('sessionNum').value;
            let payload = { action: 'SET_CLASS_LOCATION', status: mode, sessionNum: session, instructorEmail: currentUser.email };
            if(mode === 'OPEN') {
                if(!marker) return alert("Chờ GPS!");
                payload.lat = marker.getLatLng().lat; payload.lng = marker.getLatLng().lng;
            }
            const res = await fetch(API, { method: 'POST', body: JSON.stringify(payload) });
            const data = await res.json();
            if(data.success) location.reload();
        }
    </script>
</body>
</html>
